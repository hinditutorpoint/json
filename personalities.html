<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Personalities - Hindi Tutor Point</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --secondary-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hero-section {
            background: var(--primary-gradient);
            color: white;
            padding: 3rem 0 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .personality-card {
            background: white;
            border-radius: 20px;
            padding: 0;
            margin-bottom: 2rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            overflow: hidden;
        }
        
        .personality-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(0,0,0,0.2);
        }
        
        .personality-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        
        .personality-content {
            padding: 2rem;
        }
        
        .personality-name {
            font-size: 2rem;
            font-weight: 700;
            color: #00838f;
            margin-bottom: 0.5rem;
        }
        
        .personality-role {
            font-size: 1.1rem;
            color: #00acc1;
            margin-bottom: 1rem;
        }
        
        .info-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            margin: 0.3rem;
            background: var(--primary-gradient);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .search-box {
            border-radius: 25px;
            border: 2px solid #00acc1;
            padding: 0.7rem 1.5rem;
        }
        
        .search-box:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 172, 193, 0.25);
            border-color: #4facfe;
        }
        
        .page-link {
            color: #00acc1;
            border: none;
            margin: 0 0.2rem;
            border-radius: 8px;
        }
        
        .page-link:hover {
            background: var(--primary-gradient);
            color: white;
        }
        
        .page-item.active .page-link {
            background: var(--primary-gradient);
            border: none;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 3rem;
            height: 3rem;
            border: 0.4rem solid rgba(79, 172, 254, 0.3);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .key-value-row {
            padding: 0.8rem 1.2rem;
            margin: 0.3rem 0;
            background: linear-gradient(to right, #f8f9fa 0%, white 100%);
            border-left: 4px solid #4facfe;
            border-radius: 8px;
        }
        
        .key-label {
            font-weight: 600;
            color: #00838f;
            display: inline-block;
            min-width: 150px;
        }
        
        .placeholder-avatar {
            width: 100%;
            height: 300px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 5rem;
        }
    </style>
</head>
<body>
    <div x-data="personalitiesViewer()" x-init="init()">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="container">
                <div class="text-center">
                    <h1 class="display-4 fw-bold mb-3">
                        <i class="bi bi-person-badge-fill me-3"></i>
                        Tech Personalities
                    </h1>
                    <p class="lead">Pioneers and innovators shaping the technology world</p>
                    <a href="index.html" class="btn btn-light mt-3">
                        <i class="bi bi-house-fill me-2"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container pb-5">
            <!-- API Information -->
            <div class="card mb-4 border-info">
                <div class="card-body">
                    <h5 class="mb-3">
                        <i class="bi bi-code-slash me-2"></i>API Endpoint for Developers
                    </h5>
                    <div class="alert alert-info mb-3">
                        <strong>GET Request URL:</strong>
                        <div class="input-group mt-2">
                            <input 
                                type="text" 
                                class="form-control" 
                                value="https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_personalities.json" 
                                readonly>
                            <button 
                                class="btn btn-info" 
                                type="button"
                                @click="copyToClipboard('https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_personalities.json')">
                                <i class="bi bi-clipboard me-1"></i>Copy
                            </button>
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <small class="text-muted d-block">Method</small>
                            <code class="badge bg-success">GET</code>
                        </div>
                        <div class="col-md-4">
                            <small class="text-muted d-block">Format</small>
                            <code class="badge bg-info">JSON</code>
                        </div>
                        <div class="col-md-4">
                            <small class="text-muted d-block">CORS</small>
                            <code class="badge bg-warning text-dark">Enabled</code>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search and Info -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-8 mb-3 mb-md-0">
                            <input 
                                type="text" 
                                x-model="searchQuery" 
                                @input="currentPage = 1"
                                class="form-control search-box" 
                                placeholder="Search personalities by name, role, company...">
                        </div>
                        <div class="col-md-4 text-md-end">
                            <span class="badge bg-info p-2">
                                <i class="bi bi-people-fill me-2"></i>
                                <strong x-text="filteredData.length"></strong> personalities found
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div x-show="loading" class="text-center py-5">
                <div class="loading-spinner mx-auto mb-3"></div>
                <p class="text-muted">Loading personalities...</p>
            </div>

            <!-- Error State -->
            <div x-show="error" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span x-text="error"></span>
            </div>

            <!-- Personalities Display -->
            <div x-show="!loading && !error">
                <template x-for="person in paginatedData" :key="person.id">
                    <div class="personality-card">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <template x-if="person.image || person.photo || person.avatar">
                                    <img :src="person.image || person.photo || person.avatar" 
                                         :alt="person.name" 
                                         class="personality-image">
                                </template>
                                <template x-if="!person.image && !person.photo && !person.avatar">
                                    <div class="placeholder-avatar">
                                        <i class="bi bi-person-circle"></i>
                                    </div>
                                </template>
                            </div>
                            <div class="col-md-8">
                                <div class="personality-content">
                                    <h2 class="personality-name" x-text="person.name"></h2>
                                    <div class="personality-role" x-text="person.title || person.role || person.occupation || person.position"></div>
                                    
                                    <p class="mb-4" x-text="person.bio || person.description || person.about || person.contribution"></p>
                                    
                                    <!-- Show all data fields -->
                                    <button 
                                        @click="toggleDetails(person.id)" 
                                        class="btn btn-sm btn-outline-info mb-3">
                                        <span x-show="!showDetails.includes(person.id)">
                                            <i class="bi bi-list-ul me-1"></i>View All Details
                                        </span>
                                        <span x-show="showDetails.includes(person.id)">
                                            <i class="bi bi-x-circle me-1"></i>Hide Details
                                        </span>
                                    </button>
                                    
                                    <div x-show="showDetails.includes(person.id)" x-collapse>
                                        <div class="border-top pt-3">
                                            <h5 class="text-muted mb-3">Complete Profile Data:</h5>
                                            <template x-for="[key, value] in Object.entries(person)" :key="key">
                                                <div class="key-value-row" x-show="value && value !== ''">
                                                    <span class="key-label" x-text="formatKey(key)"></span>
                                                    <span x-text="formatValue(value)"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Pagination -->
                <nav x-show="totalPages > 1" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" :class="currentPage === 1 ? 'disabled' : ''">
                            <a class="page-link" href="#" @click.prevent="currentPage > 1 && changePage(currentPage - 1)">
                                <i class="bi bi-chevron-left"></i> Previous
                            </a>
                        </li>
                        
                        <template x-for="page in visiblePages" :key="page">
                            <li class="page-item" :class="currentPage === page ? 'active' : ''">
                                <a class="page-link" href="#" @click.prevent="changePage(page)" x-text="page"></a>
                            </li>
                        </template>
                        
                        <li class="page-item" :class="currentPage === totalPages ? 'disabled' : ''">
                            <a class="page-link" href="#" @click.prevent="currentPage < totalPages && changePage(currentPage + 1)">
                                Next <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
                
                <div class="text-center text-muted mt-3">
                    Page <strong x-text="currentPage"></strong> of <strong x-text="totalPages"></strong>
                    | Showing <strong x-text="paginatedData.length"></strong> personalities
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function personalitiesViewer() {
            return {
                data: [],
                loading: false,
                error: null,
                searchQuery: '',
                currentPage: 1,
                itemsPerPage: 10,
                showDetails: [],
                
                async init() {
                    await this.loadData();
                },
                
                async loadData() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        const response = await fetch('https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_personalities.json');
                        
                        if (!response.ok) {
                            throw new Error(`Failed to load data: ${response.status}`);
                        }
                        
                        let jsonData = await response.json();
                        
                        // Add ID if not present
                        this.data = Array.isArray(jsonData) ? jsonData.map((item, index) => ({
                            ...item,
                            id: item.id || index + 1
                        })) : [jsonData];
                        
                    } catch (err) {
                        this.error = 'Failed to load personalities. Please try again later.';
                        console.error(err);
                    } finally {
                        this.loading = false;
                    }
                },
                
                get filteredData() {
                    if (!this.searchQuery) return this.data;
                    
                    const query = this.searchQuery.toLowerCase();
                    return this.data.filter(item => {
                        const searchableText = JSON.stringify(item).toLowerCase();
                        return searchableText.includes(query);
                    });
                },
                
                get totalPages() {
                    return Math.ceil(this.filteredData.length / this.itemsPerPage);
                },
                
                get paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    const end = start + this.itemsPerPage;
                    return this.filteredData.slice(start, end);
                },
                
                get visiblePages() {
                    const pages = [];
                    const maxVisible = 5;
                    let startPage = Math.max(1, this.currentPage - Math.floor(maxVisible / 2));
                    let endPage = Math.min(this.totalPages, startPage + maxVisible - 1);
                    
                    if (endPage - startPage < maxVisible - 1) {
                        startPage = Math.max(1, endPage - maxVisible + 1);
                    }
                    
                    for (let i = startPage; i <= endPage; i++) {
                        pages.push(i);
                    }
                    
                    return pages;
                },
                
                changePage(page) {
                    this.currentPage = page;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },
                
                toggleDetails(id) {
                    const index = this.showDetails.indexOf(id);
                    if (index > -1) {
                        this.showDetails.splice(index, 1);
                    } else {
                        this.showDetails.push(id);
                    }
                },
                
                formatKey(key) {
                    return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) + ':';
                },
                
                formatValue(value) {
                    if (Array.isArray(value)) {
                        return value.join(', ');
                    } else if (typeof value === 'object' && value !== null) {
                        return JSON.stringify(value, null, 2);
                    } else if (typeof value === 'boolean') {
                        return value ? 'Yes' : 'No';
                    }
                    return value;
                },
                
                copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('API URL copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy:', err);
                    });
                }
            }
        }
    </script>
</body>
</html>
