<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Vocabulary - Hindi Tutor Point</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #ffa751 0%, #ffe259 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hero-section {
            background: var(--primary-gradient);
            color: white;
            padding: 3rem 0 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .vocab-card {
            background: white;
            border-radius: 15px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border-left: 5px solid transparent;
            border-image: var(--primary-gradient) 1;
        }
        
        .vocab-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .vocab-term {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .vocab-category {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: var(--secondary-gradient);
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .definition-section {
            background: #f8f9fa;
            padding: 1.2rem;
            border-radius: 10px;
            margin: 1rem 0;
            border-left: 4px solid #667eea;
        }
        
        .hindi-section {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            padding: 1.2rem;
            border-radius: 10px;
            margin: 1rem 0;
            color: #2d3436;
            font-weight: 500;
        }
        
        .example-section {
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-style: italic;
            border-left: 4px solid #4caf50;
        }
        
        .search-box {
            border-radius: 25px;
            border: 2px solid #667eea;
            padding: 0.7rem 1.5rem;
        }
        
        .search-box:focus {
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            border-color: #764ba2;
        }
        
        .page-link {
            color: #667eea;
            border: none;
            margin: 0 0.2rem;
            border-radius: 8px;
        }
        
        .page-link:hover {
            background: var(--primary-gradient);
            color: white;
        }
        
        .page-item.active .page-link {
            background: var(--primary-gradient);
            border: none;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 3rem;
            height: 3rem;
            border: 0.4rem solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .all-fields-section {
            background: #f1f3f5;
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 1.5rem;
        }
        
        .field-item {
            padding: 0.6rem 1rem;
            margin: 0.3rem 0;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            display: flex;
            gap: 1rem;
        }
        
        .field-key {
            font-weight: 600;
            color: #667eea;
            min-width: 150px;
            text-transform: capitalize;
        }
        
        .field-value {
            color: #495057;
            flex: 1;
        }
        
        .alphabet-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        
        .alphabet-btn {
            padding: 0.4rem 0.8rem;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .alphabet-btn:hover, .alphabet-btn.active {
            background: var(--primary-gradient);
            color: white;
        }
    </style>
</head>
<body>
    <div x-data="vocabularyViewer()" x-init="init()">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="container">
                <div class="text-center">
                    <h1 class="display-4 fw-bold mb-3">
                        <i class="bi bi-book-fill me-3"></i>
                        Tech Vocabulary
                    </h1>
                    <p class="lead">Comprehensive technical terms with Hindi translations</p>
                    <a href="index.html" class="btn btn-light mt-3">
                        <i class="bi bi-house-fill me-2"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container pb-5">
            <!-- API Information -->
            <div class="card mb-4 border-primary">
                <div class="card-body">
                    <h5 class="mb-3">
                        <i class="bi bi-code-slash me-2"></i>API Endpoint for Developers
                    </h5>
                    <div class="alert alert-primary mb-3">
                        <strong>GET Request URL:</strong>
                        <div class="input-group mt-2">
                            <input 
                                type="text" 
                                class="form-control" 
                                value="https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_vocabulary.json" 
                                readonly>
                            <button 
                                class="btn btn-primary" 
                                type="button"
                                @click="copyToClipboard('https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_vocabulary.json')">
                                <i class="bi bi-clipboard me-1"></i>Copy
                            </button>
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <small class="text-muted d-block">Method</small>
                            <code class="badge bg-success">GET</code>
                        </div>
                        <div class="col-md-4">
                            <small class="text-muted d-block">Format</small>
                            <code class="badge bg-info">JSON</code>
                        </div>
                        <div class="col-md-4">
                            <small class="text-muted d-block">CORS</small>
                            <code class="badge bg-warning text-dark">Enabled</code>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search and Info -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8 mb-3 mb-md-0">
                            <input 
                                type="text" 
                                x-model="searchQuery" 
                                @input="currentPage = 1; letterFilter = ''"
                                class="form-control search-box" 
                                placeholder="Search vocabulary by term, definition, Hindi meaning...">
                        </div>
                        <div class="col-md-4 text-md-end">
                            <span class="badge bg-primary p-2">
                                <i class="bi bi-book me-2"></i>
                                <strong x-text="filteredData.length"></strong> terms found
                            </span>
                        </div>
                    </div>
                    
                    <!-- Alphabet Filter -->
                    <div class="alphabet-filter">
                        <button 
                            @click="letterFilter = ''; currentPage = 1"
                            :class="letterFilter === '' ? 'active' : ''"
                            class="alphabet-btn">
                            All
                        </button>
                        <template x-for="letter in alphabet" :key="letter">
                            <button 
                                @click="filterByLetter(letter)"
                                :class="letterFilter === letter ? 'active' : ''"
                                class="alphabet-btn"
                                x-text="letter">
                            </button>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div x-show="loading" class="text-center py-5">
                <div class="loading-spinner mx-auto mb-3"></div>
                <p class="text-muted">Loading vocabulary...</p>
            </div>

            <!-- Error State -->
            <div x-show="error" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span x-text="error"></span>
            </div>

            <!-- Vocabulary Display -->
            <div x-show="!loading && !error">
                <template x-for="item in paginatedData" :key="item.id">
                    <div class="vocab-card">
                        <div class="vocab-term">
                            <i class="bi bi-bookmark-star-fill"></i>
                            <span x-text="item.term || item.word || item.title || item.name"></span>
                        </div>
                        
                        <template x-if="item.category">
                            <div class="mb-3">
                                <span class="vocab-category" x-text="item.category"></span>
                            </div>
                        </template>
                        
                        <template x-if="item.definition || item.meaning || item.description">
                            <div class="definition-section">
                                <strong class="text-primary">
                                    <i class="bi bi-text-paragraph me-2"></i>Definition:
                                </strong>
                                <p class="mb-0 mt-2" x-text="item.definition || item.meaning || item.description"></p>
                            </div>
                        </template>
                        
                        <template x-if="item.hindi || item.hindi_meaning || item.hindi_translation">
                            <div class="hindi-section">
                                <strong>
                                    <i class="bi bi-translate me-2"></i>हिंदी में:
                                </strong>
                                <p class="mb-0 mt-2" x-text="item.hindi || item.hindi_meaning || item.hindi_translation"></p>
                            </div>
                        </template>
                        
                        <template x-if="item.example || item.usage || item.sentence">
                            <div class="example-section">
                                <strong class="text-success">
                                    <i class="bi bi-quote me-2"></i>Example:
                                </strong>
                                <p class="mb-0 mt-2" x-text="item.example || item.usage || item.sentence"></p>
                            </div>
                        </template>
                        
                        <!-- Show all fields button -->
                        <button 
                            @click="toggleDetails(item.id)" 
                            class="btn btn-sm btn-outline-primary mt-3">
                            <span x-show="!showDetails.includes(item.id)">
                                <i class="bi bi-eye me-1"></i>Show All Fields
                            </span>
                            <span x-show="showDetails.includes(item.id)">
                                <i class="bi bi-eye-slash me-1"></i>Hide Fields
                            </span>
                        </button>
                        
                        <div x-show="showDetails.includes(item.id)" x-collapse class="all-fields-section">
                            <h6 class="text-muted mb-3">
                                <i class="bi bi-list-columns me-2"></i>Complete Data:
                            </h6>
                            <template x-for="[key, value] in Object.entries(item)" :key="key">
                                <div class="field-item" x-show="value && value !== ''">
                                    <div class="field-key" x-text="formatKey(key)"></div>
                                    <div class="field-value" x-text="formatValue(value)"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Pagination -->
                <nav x-show="totalPages > 1" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" :class="currentPage === 1 ? 'disabled' : ''">
                            <a class="page-link" href="#" @click.prevent="currentPage > 1 && changePage(currentPage - 1)">
                                <i class="bi bi-chevron-left"></i> Previous
                            </a>
                        </li>
                        
                        <template x-for="page in visiblePages" :key="page">
                            <li class="page-item" :class="currentPage === page ? 'active' : ''">
                                <a class="page-link" href="#" @click.prevent="changePage(page)" x-text="page"></a>
                            </li>
                        </template>
                        
                        <li class="page-item" :class="currentPage === totalPages ? 'disabled' : ''">
                            <a class="page-link" href="#" @click.prevent="currentPage < totalPages && changePage(currentPage + 1)">
                                Next <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
                
                <div class="text-center text-muted mt-3">
                    Page <strong x-text="currentPage"></strong> of <strong x-text="totalPages"></strong>
                    | Showing <strong x-text="paginatedData.length"></strong> terms
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function vocabularyViewer() {
            return {
                data: [],
                loading: false,
                error: null,
                searchQuery: '',
                letterFilter: '',
                currentPage: 1,
                itemsPerPage: 10,
                showDetails: [],
                alphabet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
                
                async init() {
                    await this.loadData();
                },
                
                async loadData() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        const response = await fetch('https://raw.githubusercontent.com/hinditutorpoint/json/main/tech_vocabulary.json');
                        
                        if (!response.ok) {
                            throw new Error(`Failed to load data: ${response.status}`);
                        }
                        
                        let jsonData = await response.json();
                        
                        // Add ID if not present
                        this.data = Array.isArray(jsonData) ? jsonData.map((item, index) => ({
                            ...item,
                            id: item.id || index + 1
                        })) : [jsonData];
                        
                    } catch (err) {
                        this.error = 'Failed to load vocabulary. Please try again later.';
                        console.error(err);
                    } finally {
                        this.loading = false;
                    }
                },
                
                filterByLetter(letter) {
                    this.letterFilter = letter;
                    this.searchQuery = '';
                    this.currentPage = 1;
                },
                
                get filteredData() {
                    let filtered = this.data;
                    
                    // Apply letter filter
                    if (this.letterFilter) {
                        filtered = filtered.filter(item => {
                            const term = (item.term || item.word || item.title || item.name || '').toUpperCase();
                            return term.startsWith(this.letterFilter);
                        });
                    }
                    
                    // Apply search filter
                    if (this.searchQuery) {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(item => {
                            const searchableText = JSON.stringify(item).toLowerCase();
                            return searchableText.includes(query);
                        });
                    }
                    
                    return filtered;
                },
                
                get totalPages() {
                    return Math.ceil(this.filteredData.length / this.itemsPerPage);
                },
                
                get paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    const end = start + this.itemsPerPage;
                    return this.filteredData.slice(start, end);
                },
                
                get visiblePages() {
                    const pages = [];
                    const maxVisible = 5;
                    let startPage = Math.max(1, this.currentPage - Math.floor(maxVisible / 2));
                    let endPage = Math.min(this.totalPages, startPage + maxVisible - 1);
                    
                    if (endPage - startPage < maxVisible - 1) {
                        startPage = Math.max(1, endPage - maxVisible + 1);
                    }
                    
                    for (let i = startPage; i <= endPage; i++) {
                        pages.push(i);
                    }
                    
                    return pages;
                },
                
                changePage(page) {
                    this.currentPage = page;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },
                
                toggleDetails(id) {
                    const index = this.showDetails.indexOf(id);
                    if (index > -1) {
                        this.showDetails.splice(index, 1);
                    } else {
                        this.showDetails.push(id);
                    }
                },
                
                formatKey(key) {
                    return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                },
                
                formatValue(value) {
                    if (Array.isArray(value)) {
                        return value.join(', ');
                    } else if (typeof value === 'object' && value !== null) {
                        return JSON.stringify(value, null, 2);
                    } else if (typeof value === 'boolean') {
                        return value ? 'Yes' : 'No';
                    }
                    return value;
                },
                
                copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('API URL copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy:', err);
                    });
                }
            }
        }
    </script>
</body>
</html>
